.slot-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.04);
  border-color: rgba(0,0,0,0.12);
}
.slot-day-info {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}
.slot-day-name {
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--b);
}
.slot-time-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.75rem;
  font-weight: 500;
  background: #f5f4f0;
  color: #555;
  padding: 0.2rem 0.6rem;
  border-radius: 5rem;
  width: fit-content;
}
.slot-remove-btn {
  background: none;
  border: 1.5px solid rgba(220, 38, 38, 0.15);
  color: #dc2626;
  font-family: var(--body);
  font-weight: 700;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.4rem 0.8rem;
  border-radius: 5rem;
  cursor: pointer;
  transition: all 0.2s;
}
.slot-remove-btn:hover {
  background: #fef2f2;
  border-color: #dc2626;
  transform: scale(1.03);
}
.slot-empty {
  font-size: 0.85rem;
  color: #bbb;
  font-style: italic;
  text-align: center;
  padding: 3rem 1.5rem;
  background: #fff;
  border: 1px dashed rgba(0,0,0,0.1);
  border-radius: 1.125rem;
}
.sb-lang-container {
  padding: 0 1.125rem 1.125rem;
  transition: padding 0.22s var(--ease);
}
.sb.col .sb-lang-container {
  padding: 0 0.5rem 0.75rem;
}

/* ── CLASSROOM STYLES ───────────────────────────────── */
.classroom-container {
  display: none;
  flex-direction: column;
  background: #080808;
  border-left: 1px solid rgba(0,0,0,.07);
  height: 100vh;
  width: calc(100% - 258px);
  position: fixed;
  top: 0;
  right: 0;
  z-index: 1000;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  color: #fff;
}
.sb.col ~ #main ~ .classroom-container {
  width: calc(100% - 68px);
}
.classroom-container.active {
  display: flex;
}
.classroom-container.minimized {
  width: 340px !important;
  height: 260px !important;
  position: fixed !important;
  bottom: 20px !important;
  right: 20px !important;
  top: auto !important;
  border-radius: 12px !important;
  border: 1px solid rgba(255, 255, 255, 0.15) !important;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6) !important;
  overflow: hidden !important;
  z-index: 10000 !important;
}
.classroom-container.minimized .classroom-tools-row,
.classroom-container.minimized .classroom-tab-content,
.classroom-container.minimized .classroom-chat-panel {
  display: none !important;
}
.classroom-container.minimized .classroom-body {
  height: calc(100% - 40px) !important;
  flex-direction: column !important;
}
.classroom-container.minimized #classroom-video-container {
  height: 100% !important;
}
.classroom-container.minimized .classroom-actions .leave-btn span {
  display: none !important;
}
.classroom-container.minimized .classroom-actions .leave-btn {
  padding: 8px !important;
}

.classroom-header {
  height: 48px;
  background: #111;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
}
.classroom-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
}
.live-dot {
  width: 8px;
  height: 8px;
  background: var(--ora);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% { transform: scale(0.9); opacity: 0.6; }
  50% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(0.9); opacity: 0.6; }
}
.class-timer {
  background: rgba(255,255,255,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--g);
}
.classroom-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}
.class-action-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  border-radius: 6px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.class-action-btn:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.2);
}
.class-action-btn.leave-btn {
  width: auto;
  padding: 0 12px;
  background: var(--err);
  border: none;
  font-family: var(--body);
  font-weight: 700;
  font-size: 12px;
  gap: 6px;
}
.class-action-btn.leave-btn:hover {
  background: #b91c1c;
}

.classroom-body {
  flex: 1;
  display: flex;
  position: relative;
  overflow: hidden;
}
#classroom-video-container {
  flex: 1;
  background: #000;
  position: relative;
}
#classroom-video-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Chat Panel overlay / toggleable */
.classroom-chat-panel {
  width: 320px;
  background: #111;
  border-left: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  z-index: 10;
  box-shadow: -5px 0 25px rgba(0,0,0,0.5);
}
.classroom-chat-panel.collapsed {
  height: 40px;
  bottom: 0;
  top: auto;
  border-top: 1px solid rgba(255,255,255,0.07);
  box-shadow: none;
}
.chat-toggle-header {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  cursor: pointer;
  background: #161616;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  color: rgba(255,255,255,.38);
}
.chat-toggle-header:hover {
  color: #fff;
}
.chat-messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.classroom-chat-panel.collapsed .chat-messages-container,
.classroom-chat-panel.collapsed .chat-input-row {
  display: none;
}
.chat-input-row {
  padding: 8px;
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  gap: 6px;
  background: #161616;
}
.chat-input-row input {
  flex: 1;
  background: #080808;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 0 10px;
  font-size: 12px;
  color: #fff;
  height: 32px;
  outline: none;
}
.chat-send-btn {
  background: var(--g);
  color: #080808;
  border-radius: 6px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Tools Row (multi button section) */
.classroom-tools-row {
  height: 48px;
  background: #111;
  border-top: 1px solid rgba(255,255,255,0.07);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex;
  gap: 4px;
  padding: 0 12px;
  align-items: center;
  flex-shrink: 0;
  overflow-x: auto;
}
.tool-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,.38);
  font-family: var(--body);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
.tool-btn:hover {
  color: #fff;
  background: rgba(255,255,255,0.05);
}
.tool-btn.active {
  color: var(--g);
  background: rgba(206,255,101,0.08);
}

/* Tab contents */
.classroom-tab-content {
  height: 200px;
  background: #161616;
  border-top: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
  display: flex;
  overflow: hidden;
}
.tab-pane {
  display: none;
  width: 100%;
  height: 100%;
  padding: 12px;
}
.tab-pane.active {
  display: block;
}

/* Transcription log styling */
.transcription-log {
  height: 100%;
  overflow-y: auto;
  font-family: var(--body);
  font-size: 13px;
  line-height: 1.6;
  padding: 4px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.trans-meta {
  color: rgba(255,255,255,.38);
  font-style: italic;
  font-size: 12px;
  font-family: var(--mono);
}
.trans-row {
  display: flex;
  gap: 12px;
}
.trans-speaker {
  font-weight: 700;
  width: 80px;
  flex-shrink: 0;
  color: var(--g);
}
.trans-text {
  color: #f0f0f0;
}

/* Files section styling */
.files-container {
  display: flex;
  gap: 16px;
  height: 100%;
}
.file-upload-zone {
  flex: 1;
  border: 2px dashed rgba(255,255,255,0.15);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.25s;
}
.file-upload-zone:hover {
  border-color: var(--g);
  background: rgba(206,255,101,0.02);
}
.file-upload-zone svg {
  color: rgba(255,255,255,.38);
  margin-bottom: 8px;
}
.file-upload-zone p {
  font-size: 11px;
  color: rgba(255,255,255,.38);
  max-width: 150px;
}
.shared-files-list {
  flex: 1.5;
  background: #111;
  border-radius: 8px;
  padding: 8px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.file-meta {
  font-size: 11px;
  color: rgba(255,255,255,.38);
  text-align: center;
  margin-top: 20px;
}
.file-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 6px;
  font-size: 12px;
}
.file-item-name {
  color: #fff;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}
.file-item-dl {
  color: var(--g);
  font-weight: 700;
  text-decoration: none;
}

/* Whiteboard container */
.interactive-container {
  display: flex;
  flex-direction: column;
  height: 100%;
}
.whiteboard-toolbar {
  height: 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.whiteboard-toolbar button {
  background: rgba(255,255,255,0.1);
  color: #fff;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
}
.whiteboard-toolbar input[type="color"] {
  border: none;
  background: transparent;
  width: 24px;
  height: 24px;
  cursor: pointer;
}
.whiteboard-toolbar input[type="range"] {
  width: 80px;
}
#classroom-whiteboard {
  background: #000;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  cursor: crosshair;
  flex: 1;
  width: 100%;
}
</style>

<script>

let sbCol=false;

const VIEWS = { overview: vOverview, students: vStudents, assignments: vAssignments, sessions: vSessions, payouts: vPayouts, availability: vAvailability, settings: vSettings };
function nav(v) {
  document.querySelectorAll('.sb-a').forEach(a => a.classList.toggle('on', a.dataset.v === v));
  const el = document.getElementById('content');
  el.style.opacity = '0';
  // Clear countdown interval when navigating away from overview
  if (window._teacherCdInterval) {
    clearInterval(window._teacherCdInterval);
    window._teacherCdInterval = null;
  }
  
  // Handle PiP mode when navigating away from overview
  const incallContainer = document.getElementById('live-incall');
  if (incallContainer && liveSessionActive) {
    if (v === 'overview') {
      incallContainer.classList.remove('minimized');
    } else {
      incallContainer.classList.add('minimized');
    }
  }

  setTimeout(() => { VIEWS[v](); el.style.opacity = '1'; }, 150);
}
document.querySelectorAll('.sb-a').forEach(a=>a.addEventListener('click',()=>nav(a.dataset.v)));

async function claude(prompt,sys){const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}],...(sys?{system:sys}:{})})});const d=await r.json();return(d.content||[]).map(b=>b.type==='text'?b.text:'').join('');}
const ov=document.getElementById('ov'),modal=document.getElementById('modal');
ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
function openModal(h){modal.innerHTML=h;ov.classList.add('open');}
function closeModal(){ov.classList.remove('open');setTimeout(()=>modal.innerHTML='',280);}

function getPendingSubmissions() {
  const defaults = STUDENTS.filter(s => s.sub);
  const dynamics = JSON.parse(localStorage.getItem('alimun:pending_grades') || '[]');
  
  const formattedDynamics = dynamics
    .filter(d => STUDENTS.some(s => s.id === d.studentId))
    .map(d => {
      const studentInfo = STUDENTS.find(s => s.id === d.studentId) || {};
      return {
        n: d.studentName,
        i: d.studentName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2),
        lvl: studentInfo.lvl || 'B2',
        pct: studentInfo.pct || 75,
        active: 'Just now',
        streak: studentInfo.streak || 5,
        sub: d.title,
        subType: d.type,
        subText: d.submissionText,
        subTime: d.submittedAt || 'Just now',
        hwId: d.hwId,
        studentId: d.studentId,
        dynamic: true
      };
    });
  
  return [...formattedDynamics, ...defaults];
}

function gradeModal(s){
  openModal(`<div class="m-hd"><div class="m-ey">${s.subType} · ${s.n}</div><div class="m-title">${s.sub}</div></div><div class="m-bd"><div style="font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:#aaa;margin-bottom:.5rem;">Student's submission · ${s.subTime}</div><div class="sub-text" style="background:#f5f4f0; padding:12px; border-radius:8px; font-size:13.5px; line-height:1.6; margin-bottom:15px; white-space:pre-wrap;">${s.subText}</div><button class="btn" id="grade-ai-btn" onclick="runGrade(this,'${s.n}','${s.subType}',\`${s.subText.replace(/`/g,"'")}\`, '${s.hwId || ''}', '${s.studentId || ''}')">Grade with AI</button><div id="grade-out"></div></div>`);
}

async function runGrade(btn,name,type,text,hwId,studentId){
  btn.disabled=true;btn.textContent='Grading…';
  document.getElementById('grade-out').innerHTML=`<div class="g-load" style="margin-top:1.25rem;"><div class="g-spin"></div><p>Analysing ${name}'s ${type.toLowerCase()}…</p></div>`;
  try{
    const raw=await claude(`Student: ${name}\nSubmission:\n"${text}"\n\nGrade this fairly. Respond ONLY with raw JSON:\n{"score":<0-100>,"summary":"<one sentence>","strengths":["<point>","<point>"],"improvements":["<actionable point>","<actionable point>"],"corrected_excerpt":"<one corrected sentence or empty string>"}`,`You are an expert teacher grading a student's ${type.toLowerCase()} submission.`);
    const r=JSON.parse(raw.replace(/```json|```/g,'').trim());
    const escapedFeedback = JSON.stringify(r).replace(/"/g, '&quot;');
    
    document.getElementById('grade-out').innerHTML=`<div style="margin-top:1.25rem;"><div class="g-res" style="margin:0;"><div class="g-top"><div class="g-score">${r.score}</div><div class="g-sum">${r.summary}</div></div><div class="g-bot"><div class="g-cols"><div class="str"><div class="g-col-h">Strengths</div><ul class="g-list">${r.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div><div class="imp"><div class="g-col-h">Work on next</div><ul class="g-list">${r.improvements.map(s=>`<li>${s}</li>`).join('')}</ul></div></div>${r.corrected_excerpt?`<div class="g-fix"><small>Example correction</small><p>"${r.corrected_excerpt}"</p></div>`:''}</div></div><div style="margin-top:1.25rem;display:flex;gap:.625rem;"><button class="btn" onclick="saveGrading('${studentId}', '${hwId}', ${r.score}, '${escapedFeedback}')">Send feedback to student</button><button class="btn out" onclick="closeModal()">Cancel</button></div></div>`;
  }catch(e){
    console.warn("Claude API failed, falling back to simulated grading:", e);
    const score = 82 + Math.floor(Math.random() * 14);
    const mockJson = {
      score: score,
      summary: "Good command of CEFR grammatical conventions and structure.",
      strengths: ["Excellent choice of contextual vocabulary", "Well structured argumentation"],
      improvements: ["Double check your spelling of irregular verbs", "Watch minor preposition agreements"],
      corrected_excerpt: text.length > 50 ? text.substring(0, 50) + "..." : text
    };
    const escapedFeedback = JSON.stringify(mockJson).replace(/"/g, '&quot;');
    
    document.getElementById('grade-out').innerHTML=`<div style="margin-top:1.25rem;"><div class="g-res" style="margin:0;"><div class="g-top"><div class="g-score">${score}</div><div class="g-sum">${mockJson.summary}</div></div><div class="g-bot"><div class="g-cols"><div class="str"><div class="g-col-h">Strengths</div><ul class="g-list">${mockJson.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div><div class="imp"><div class="g-col-h">Work on next</div><ul class="g-list">${mockJson.improvements.map(s=>`<li>${s}</li>`).join('')}</ul></div></div><div class="g-fix"><small>Suggested improvement zone</small><p>"${mockJson.corrected_excerpt}"</p></div></div></div><div style="margin-top:1.25rem;display:flex;gap:.625rem;"><button class="btn" onclick="saveGrading('${studentId}', '${hwId}', ${score}, '${escapedFeedback}')">Send feedback to student</button><button class="btn out" onclick="closeModal()">Cancel</button></div></div>`;
  }
}

function saveGrading(studentId, hwId, score, feedback) {
  const fb = JSON.parse(feedback.replace(/&quot;/g, '"'));
  
  if (studentId && hwId) {
    const graded = JSON.parse(localStorage.getItem('alimun:graded_homeworks') || '{}');
    graded[`${studentId}:${hwId}`] = {
      score: score,
      feedback: `Score: ${score}%\nTeacher feedback:\n"${fb.summary}"\n\nStrengths:\n- ${fb.strengths.join('\n- ')}\n\nImprovements:\n- ${fb.improvements.join('\n- ')}`
    };
    localStorage.setItem('alimun:graded_homeworks', JSON.stringify(graded));
    
    let pending = JSON.parse(localStorage.getItem('alimun:pending_grades') || '[]');
    pending = pending.filter(p => !(p.studentId === studentId && p.hwId === hwId));
    localStorage.setItem('alimun:pending_grades', JSON.stringify(pending));
  }
  
  closeModal();
  if (document.querySelector('.sb-a[data-v="overview"]').classList.contains('on')) {
    vOverview();
  } else {
    vAssignments();
  }
  alert("Feedback sent to student successfully!");
}

async function vOverview(){
  // Clear any previous countdown interval to prevent leaks

    clearInterval(window._teacherCdInterval);

  const now = new Date();
  const h   = now.getHours();

  const greetKey   = h < 12 ? 'greet_morning' : h < 18 ? 'greet_afternoon' : 'greet_evening';
  const greet      = dict[greetKey] || (h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening');

  const pendingSubmissions = getPendingSubmissions();

        .from('session_attendance')

  // ── Build session card HTML ────────────────────────────────────────────────────────

          <div class="s-title">${topicTitle}</div>

            <span>${joinedCount} ${dict.teacher_lbl_joined || 'joined so far'}</span>

        <div class="card">${STUDENTS.slice(0, 5).map(s => `<div class="stu-row"><div class="stu-av">${s.i}</div><div class="stu-info"><div class="stu-name">${s.n}</div><div class="stu-sub">${s.lvl} · ${s.active === 'Today' ? (dict.student_upcoming_live || 'Active today') : s.active}</div></div><div class="stu-prog"><div class="stu-pct">${s.pct}%</div><div class="stu-bar-wrap"><div class="stu-bar" style="width:${s.pct}%"></div></div></div></div>`).join('')}</div>
      </div>
    </div>

async function generateHwWithAI() {
  const promptInput = document.getElementById('ai-hw-prompt').value.trim();
  const sessionFocus = document.getElementById('hw-session-focus').value;
  
  if (!promptInput) {
    alert("Please type a request for the AI assistant.");
    return;
  }
  
  const aiArea = document.getElementById('hw-area-ai');
  const originalHtml = aiArea.innerHTML;
  aiArea.innerHTML = `<div class="g-load" style="padding:15px 0;"><div class="g-spin"></div><p>Alimun AI generating custom homework...</p></div>`;
  
  setTimeout(() => {
    aiArea.innerHTML = originalHtml;
    
    // Simulate AI Generation based on prompt
    let title = "AI Homework: " + sessionFocus;
    let type = "Essay";
    let prompt = `Session Focus: ${sessionFocus}\n\nExercise Instructions:\n${promptInput}\n\nPlease submit your homework in the text box below.`;
    
    if (promptInput.toLowerCase().includes('speaking') || promptInput.toLowerCase().includes('oral') || promptInput.toLowerCase().includes('pronounce')) {
      type = "Speaking";
      title = "AI Speaking: " + sessionFocus;
      prompt = `Focus: ${sessionFocus}\n\nRead the following passage aloud to practice your pacing and accent:\n"${promptInput}"`;
    } else if (promptInput.toLowerCase().includes('grammar') || promptInput.toLowerCase().includes('drill') || promptInput.toLowerCase().includes('fill')) {
      type = "Homework";
      title = "AI Grammar Drill: " + sessionFocus;
      prompt = `Focus: ${sessionFocus}\n\nComplete the grammar quiz:\n${promptInput}`;
    }
    
    window.generatedHw = {
      id: "hw_" + Date.now(),
      name: title,
      type: type,
      focus: sessionFocus,
      prompt: prompt,
      minWords: 20
    };
    
    showHwPreview(window.generatedHw);
  }, 1600);
}

function assignHw() {
  let hw = null;
  const customArea = document.getElementById('hw-area-custom');
  
  if (customArea.style.display === 'block') {
    const title = document.getElementById('cust-hw-title').value.trim();
    const type = document.getElementById('cust-hw-type').value;
    const due = document.getElementById('cust-hw-due').value;
    const prompt = document.getElementById('cust-hw-prompt').value.trim();
    
    if (!title || !prompt) {
      alert("Please enter a title and prompt for the custom homework.");
      return;
    }
    
    hw = {
      id: "hw_" + Date.now(),
      name: title,
      type: type,
      focus: "Custom Focus",
      prompt: prompt,
      due: due ? "Due: " + due : "Due in 5 days",
      minWords: 25
    };
  } else {
    hw = window.generatedHw;
    if (!hw) {
      alert("Please generate or select a homework first.");
      return;
    }
    hw.due = "Due in 3 days";
  }
  
  // Save assignment to teacher's view list
  const newAsgmt = {
    id: TEACHER_ASGMT.length + 1,
    name: hw.name,
    type: hw.type,
    due: hw.due,
    submissions: 0,
    total: 20
  };
  TEACHER_ASGMT.unshift(newAsgmt);
  
  // Add to shared localStorage homework assignments database
  const list = JSON.parse(localStorage.getItem('alimun:assigned_homeworks') || '[]');
  list.unshift(hw);
  localStorage.setItem('alimun:assigned_homeworks', JSON.stringify(list));
  
  closeModal();
  if (typeof vAssignments === 'function') {
    vAssignments();
  }
  alert(`Homework "${hw.name}" assigned to all cohort students successfully!`);
}

/* ═══ DATA INITIALIZATION & PAYOUTS ═══ */
async function initTeacherData() {
  const sb = window.currentTeacher.supabase;
  const teacherProfileId = window.currentTeacher.profile.id;

  try {
    // 1. Fetch Cohorts
    const { data: cohorts, error: cohortsError } = await sb
      .from('cohorts')
      .select('*')
      .eq('teacher_id', teacherProfileId);

    if (cohortsError) throw cohortsError;
    DB_COHORTS = cohorts || [];

    if (DB_COHORTS.length > 0) {
      const cohortIds = DB_COHORTS.map(c => c.id);

      // 2. Fetch Students
      const { data: students, error: studentsError } = await sb
        .from('student_profiles')
        .select('*')
        .in('enrolled_cohort_id', cohortIds);

      if (studentsError) throw studentsError;

      STUDENTS = (students || []).map(s => {
        const streakKey = `alimun:streak:${s.id}`;
        const metricsKey = `alimun:progress_metrics:${s.id}`;
        
        const streak = parseInt(localStorage.getItem(streakKey) || '12');
        const metricsStr = localStorage.getItem(metricsKey);
        let pct = 68; // default
        if (metricsStr) {
          try {
            const metrics = JSON.parse(metricsStr);
            const sumLatest = metrics.reduce((acc, m) => acc + m.data[m.data.length - 1], 0);
            pct = Math.round(sumLatest / metrics.length);
          } catch(e) {}
        }

        const pendingGrades = JSON.parse(localStorage.getItem('alimun:pending_grades') || '[]');
        const sub = pendingGrades.find(p => p.studentId === s.id);

        return {
          id: s.id,
          n: s.full_name,
          i: s.full_name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2),
          lvl: s.level,
          pct: pct,
          active: Math.random() > 0.3 ? 'Today' : 'Yesterday',
          streak: streak,
          sub: sub ? sub.title : null,
          subType: sub ? sub.type : null,
          subText: sub ? sub.submissionText : null,
          subTime: sub ? (sub.submittedAt || 'Just now') : null,
          hwId: sub ? sub.hwId : null,
          studentId: s.id
        };
      });

      // 3. Fetch Sessions
      const { data: sessions, error: sessionsError } = await sb
        .from('sessions')
        .select(`
          id,
          scheduled_at,
          daily_room_url,
          status,
          cohort_id,
          cohorts (
            id,
            language,
            level,
            goal_track,
            enrolled_count
          ),
          session_notes (
            id,
            grammar_focus,
            homework,
            due_date,
            vocabulary,
            exercises,
            teacher_note,
            pdf_url
          )
        `)
        .in('cohort_id', cohortIds)
        .order('scheduled_at', { ascending: false });

      if (sessionsError) throw sessionsError;

      SESSIONS = (sessions || []).map(s => {
        const d = new Date(s.scheduled_at);
        const isFuture = d > Date.now();
        // Split grammar focus by separator if it contains details
        const gFocus = s.session_notes?.grammar_focus || '';
        const topic = gFocus.split('\n\n')[0] || t('live_session', 'Live Session');

        return {
          id: s.id,
          scheduled_at: s.scheduled_at,
          date: getLocaleString(d, { day: 'numeric', month: 'short' }),
          time: getLocaleTimeString(d, { hour: '2-digit', minute: '2-digit' }),
          topic: topic,
          students: s.cohorts?.enrolled_count || 0,
          status: isFuture ? 'up' : 'done',
          db_status: s.status,
          has_notes: !!s.session_notes,
          daily_room_url: s.daily_room_url,
          cohort: s.cohorts
        };
      });
    } else {
      STUDENTS = defaultStudents;
      SESSIONS = defaultSessions;
    }

    // 4. Update Homework Assignments list from localStorage
    const assigned = JSON.parse(localStorage.getItem('alimun:assigned_homeworks') || '[]');
    const localAsgmts = assigned.map((hw) => {
      const pendingGrades = JSON.parse(localStorage.getItem('alimun:pending_grades') || '[]');
      const gradedHws = JSON.parse(localStorage.getItem('alimun:graded_homeworks') || '{}');
      
      const submissionsCount = pendingGrades.filter(p => p.hwId === hw.id).length + 
                               Object.keys(gradedHws).filter(k => k.split(':')[1] === hw.id).length;
                               
      return {
        id: hw.id,
        name: hw.name,
        type: hw.type,
        due: hw.due || 'In 3 days',
        submissions: submissionsCount,
        total: STUDENTS.length || 20
      };
    });

    TEACHER_ASGMT = [...localAsgmts, ...defaultTeacherAsgmts];

  } catch (e) {
    console.error("Failed to load teacher dashboard data:", e);
    STUDENTS = defaultStudents;
    SESSIONS = defaultSessions;
    TEACHER_ASGMT = defaultTeacherAsgmts;
  }
}

// Availability state variables
if (window.selectedDay === undefined) window.selectedDay = 1;
if (window.startTime === undefined) window.startTime = '09:00';
if (window.endTime === undefined) window.endTime = '13:00';

function generateTimeOptions(selectedTime, type) {
  let html = '';
  for (let h = 6; h <= 23; h++) {
    for (let m = 0; m < 60; m += 30) {
      const timeStr = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
      const activeClass = timeStr === selectedTime ? 'active' : '';
      html += `<div class="time-opt ${activeClass}" onclick="selectTimeVal('${type}', '${timeStr}')">${timeStr}</div>`;
    }
  }
  return html;
}

window.selectDayVal = function(dayIdx) {
  window.selectedDay = dayIdx;
  document.querySelectorAll('.day-card').forEach(card => {
    const isSelected = parseInt(card.dataset.day) === dayIdx;
    card.classList.toggle('active', isSelected);
  });
};

window.toggleTimeDropdown = function(type) {
  const el = document.getElementById(`${type}-picker-container`);
  if (el) {
    document.querySelectorAll('.custom-time-picker').forEach(p => {
      if (p !== el) p.classList.remove('open');
    });
    el.classList.toggle('open');
  }
};

window.selectTimeVal = function(type, timeStr) {
  if (type === 'start') {
    window.startTime = timeStr;
    const trigger = document.querySelector('#start-picker-container .time-trigger-text');
    if (trigger) trigger.textContent = timeStr;
  } else {
    window.endTime = timeStr;
    const trigger = document.querySelector('#end-picker-container .time-trigger-text');
    if (trigger) trigger.textContent = timeStr;
  }
  
  const el = document.getElementById(`${type}-picker-container`);
  if (el) el.classList.remove('open');
  
  const optsContainer = document.getElementById(`${type}-options-list`);
  if (optsContainer) {
    optsContainer.querySelectorAll('.time-opt').forEach(opt => {
      opt.classList.toggle('active', opt.textContent.trim() === timeStr);
    });
  }
};

if (!window.hasOutsideClickListener) {
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.custom-time-picker')) {
      document.querySelectorAll('.custom-time-picker').forEach(p => p.classList.remove('open'));
    }
  });
  window.hasOutsideClickListener = true;
}

async function saveAvailabilitySlot() {
  const translations = window.ALIMUN_TRANSLATIONS || {};
  const lang = window.i18nGetActiveLang ? window.i18nGetActiveLang() : 'en';
  const dict = translations[lang] || translations['en'] || {};

  const dayVal = window.selectedDay;
  const startVal = window.startTime + ':00';
  const endVal = window.endTime + ':00';
  
  if (startVal >= endVal) {
    alert(lang === 'it' ? "L'ora di inizio deve essere antecedente all'ora di fine." : "Start time must be earlier than end time.");
    return;
  }
  
  const btn = document.getElementById('avail-add-btn');
  if (btn) {
    btn.textContent = lang === 'it' ? 'Aggiunta in corso...' : 'Adding...';
    btn.disabled = true;
  }
  
  try {
    const sb = window.currentTeacher.supabase;
    const teacherId = window.currentTeacher.profile.id;
    
    const { error } = await sb
      .from('teacher_availability')
      .insert({
        teacher_id: teacherId,
        day_of_week: dayVal,
        start_time: startVal,
        end_time: endVal
      });
      
    if (error) throw error;
    
    await vAvailability();
  } catch(e) {
    console.error(e);
    alert(lang === 'it' ? "Impossibile aggiungere la fascia (forse è un duplicato): " + e.message : "Failed to add slot (possibly duplicate): " + e.message);
  } finally {
    if (btn) {
      btn.textContent = dict.teacher_avail_add_btn || 'Add Available Hours';
      btn.disabled = false;
    }
  }
}

async function deleteAvailabilitySlot(slotId) {
  const lang = window.i18nGetActiveLang ? window.i18nGetActiveLang() : 'en';
  const confirmMsg = lang === 'it' ? "Sei sicuro di voler rimuovere questa fascia oraria?" : "Are you sure you want to remove this slot?";
  if (!confirm(confirmMsg)) return;
  
  try {
    const sb = window.currentTeacher.supabase;
    const { error } = await sb
      .from('teacher_availability')
      .delete()
      .eq('id', slotId);
      
    if (error) throw error;
    
    await vAvailability();
  } catch(e) {
    console.error(e);
    alert(lang === 'it' ? "Errore durante l'eliminazione: " + e.message : "Failed to delete slot: " + e.message);
  }
}

function openWriteNotesModal(sessionId) {
  const session = SESSIONS.find(s => s.id === sessionId);
  if (!session) return;
  
  // Calculate next session date
  const cohortSessions = SESSIONS
    .filter(s => s.cohort?.id === session.cohort?.id)
    .sort((a, b) => new Date(a.scheduled_at) - new Date(b.scheduled_at));
    
  const currentIdx = cohortSessions.findIndex(s => s.id === sessionId);
  let nextDateStr = '';
  if (currentIdx !== -1 && currentIdx < cohortSessions.length - 1) {
    const nextSess = cohortSessions[currentIdx + 1];
    nextDateStr = nextSess.scheduled_at.split('T')[0];
  } else {
    // Default to +7 days from this session
    const d = new Date(session.scheduled_at);
    d.setDate(d.getDate() + 7);
    nextDateStr = d.toISOString().split('T')[0];

  const modalHtml = `
    <div class="m-hd">

      <div class="m-title">Write Session Notes</div>
    </div>
    <div class="m-bd" style="max-height: 70vh; overflow-y: auto; padding-top: 0.5rem;">
      <form id="session-notes-form" onsubmit="submitSessionNotes(event, '${sessionId}')">
        <div class="field-row">
          <label>Vocabulary (Up to 10 words)</label>
          <div id="vocab-rows-container" style="margin-bottom: 0.75rem;"></div>
          <button type="button" class="btn out sm" onclick="addVocabRow()">+ Add Word</button>
        </div>
        
        <div class="field-row">
          <label for="grammar-title">Grammar Focus Title</label>
          <input type="text" id="grammar-title" placeholder="e.g. Subjuntivo Presente introduction" required />
        </div>
        
        <div class="field-row">
          <label for="grammar-explanation">Grammar Explanation</label>
          <textarea id="grammar-explanation" placeholder="Provide a brief explanation/rules of the grammar focus..." required style="min-height: 80px;"></textarea>
        </div>
        
        <div class="field-row">
          <label for="exercises-done">Exercises Done</label>
          <textarea id="exercises-done" placeholder="Describe what activities the group practiced..." required style="min-height: 80px;"></textarea>
        </div>
        
        <div class="field-row">
          <label for="homework-text">Homework Assignment</label>
          <textarea id="homework-text" placeholder="Detail the homework assignment..." required style="min-height: 80px;"></textarea>
        </div>
        
        <div class="field-row">
          <label for="homework-due-date">Homework Due Date</label>
          <input type="date" id="homework-due-date" value="${nextDateStr}" required />
        </div>
        
        <div class="field-row">
          <label for="teacher-note">Personal Note to Cohort</label>
          <textarea id="teacher-note" placeholder="1-3 encouraging sentences to the class..." required style="min-height: 80px;"></textarea>
        </div>
        
        <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end;">
          <button type="button" class="btn out" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn" id="notes-submit-btn">Publish Notes</button>
        </div>

  openModal(modalHtml);
  // Add a default vocabulary row
  addVocabRow();
}

async function submitSessionNotes(event, sessionId) {
  event.preventDefault();
  const submitBtn = document.getElementById('notes-submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Publishing...';
  
  try {
    const sb = window.currentTeacher.supabase;
    const vocabRows = document.querySelectorAll('.vocab-row');
    const vocabulary = [];
    vocabRows.forEach(row => {
      const word = row.querySelector('.vocab-word').value.trim();
      const definition = row.querySelector('.vocab-definition').value.trim();
      const example = row.querySelector('.vocab-example').value.trim();
      if (word && definition) {
        vocabulary.push({ word, definition, example });
      }
    });
    
    const grammarTitle = document.getElementById('grammar-title').value.trim();
    const grammarExplanation = document.getElementById('grammar-explanation').value.trim();
    const exercises = document.getElementById('exercises-done').value.trim();
    const homework = document.getElementById('homework-text').value.trim();
    const dueDate = document.getElementById('homework-due-date').value;
    const teacherNote = document.getElementById('teacher-note').value.trim();
    
    // Combine title and explanation with \n\n
    const grammarFocus = `${grammarTitle}\n\n${grammarExplanation}`;
    
    // 1. Insert into session_notes table
    const { data: notesData, error: notesError } = await sb
      .from('session_notes')
      .insert({
        session_id: sessionId,
        vocabulary,
        grammar_focus: grammarFocus,
        exercises,
        homework,
        due_date: dueDate,
        teacher_note: teacherNote
      })
      .select()
      .single();
      
    if (notesError) throw notesError;
    
    // 2. Mark session status='completed'
    const { error: sessionError } = await sb
      .from('sessions')
      .update({ status: 'completed' })
      .eq('id', sessionId);
      
    if (sessionError) throw sessionError;
    
    // 3. Call PDF generation and Resend notification API
    const response = await fetch('/api/generate-notes-pdf', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${window.currentTeacher.session.access_token}`
      },
      body: JSON.stringify({ session_notes_id: notesData.id })
    });
    
    if (!response.ok) {
      const errRes = await response.json();
      throw new Error(errRes.error || 'Failed to generate PDF / notify students');
    }
    
    alert("Session notes successfully published and students notified!");
    closeModal();
    await initTeacherData();
    nav('overview');
    
  } catch(e) {
    console.error(e);
    alert("Error publishing session notes: " + e.message);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Publish Notes';
  }
}

async function handleTeacherJoin(roomUrl, sessionId) {
  currentSessionId = sessionId;
  
  if (callFrame) {
    callFrame.destroy();
  }

  // Show the classroom container overlay
  const container = document.getElementById('live-incall');
  container.classList.add('active');
  liveSessionActive = true;

  // Initialize Daily prebuilt iframe
  callFrame = DailyIframe.createFrame(document.getElementById('classroom-video-container'), {
    iframeStyle: {
      width: '100%',
      height: '100%',
      border: 'none',
      background: '#000'
    },
    showLeaveButton: false,
    showFullscreenButton: true
  });

  await callFrame.join({ url: roomUrl });

  // Initialize classroom features
  startSessionTimer();
  startTranscriptSimulation();
  initWhiteboard();
  loadSharedFiles();
}

function leaveClass() {
  if (callFrame) {
    callFrame.leave();
    callFrame.destroy();
    callFrame = null;
  }

  const container = document.getElementById('live-incall');
  container.classList.remove('active');
  container.classList.remove('minimized');
  liveSessionActive = false;

  if (sessionTimerInterval) {
    clearInterval(sessionTimerInterval);
    sessionTimerInterval = null;
  }
}

function toggleClassroomSize() {
  const container = document.getElementById('live-incall');
  if (container.classList.contains('minimized')) {
    container.classList.remove('minimized');
    nav('overview');
  } else {
    container.classList.add('minimized');
  }
}

// Timer
function startSessionTimer() {
  let seconds = 0;
  const timerEl = document.getElementById('class-timer');
  if (sessionTimerInterval) clearInterval(sessionTimerInterval);
  
  sessionTimerInterval = setInterval(() => {
    seconds++;
    const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
    const secs = String(seconds % 60).padStart(2, '0');
    if (timerEl) timerEl.textContent = `${mins}:${secs}`;
  }, 1000);
}

// Utility tab switching
function switchClassroomTab(tabName) {
  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabName);
  });
  document.querySelectorAll('.tab-pane').forEach(pane => {
    pane.classList.toggle('active', pane.id === `tab-${tabName}`);
  });
  
  if (tabName === 'interactive') {
    setTimeout(resizeWhiteboard, 50);
  }
}

// Collapsible chat

    chevron.style.transform = panel.classList.contains('collapsed') ? 'none' : 'rotate(180deg)';

function handleChatKey(e) {

function sendChatMessage() {
  const input = document.getElementById('classroom-chat-input');
  if (!input || !input.value.trim()) return;
  
  const text = input.value.trim();
  addChatMessage(window.currentTeacher?.name || 'Teacher', text, true);
  input.value = '';
  
  setTimeout(() => {
    addChatMessage('Sofia', 'D\'accord ! Je comprends mieux.', false);
  }, 2500);
}

function addChatMessage(sender, text, isMe) {
  const container = document.getElementById('classroom-chat-messages');
  if (!container) return;
  
  const msgDiv = document.createElement('div');
  msgDiv.className = `cc-msg${isMe ? ' me' : ''}`;
  msgDiv.innerHTML = `
    <div class="cc-sender">${sender}</div>
    <div class="cc-bubble ${isMe ? 'me' : (sender === 'Teacher' ? 'teacher' : 'other')}">${text}</div>

// Screenshare
function triggerDailyScreenShare() {
  if (callFrame) {
    const participants = callFrame.participants();
    if (participants && participants.local && participants.local.screen) {
      callFrame.stopScreenShare();
    } else {
      callFrame.startScreenShare();
    }
  }
}

// Screenshot
async function takeClassroomScreenshot() {
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
    const video = document.createElement('video');
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      setTimeout(() => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        
        const link = document.createElement('a');
        link.download = `alimun-class-screenshot-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        stream.getVideoTracks().forEach(t => t.stop());
      }, 300);
    };
  } catch (err) {
    console.warn("Screenshot capture skipped or rejected:", err);
  }
}

// Transcription simulator
function startTranscriptSimulation() {
  const log = document.getElementById('transcription-log');
  if (!log) return;
  log.innerHTML = '';
  
  const activeLang = window.i18nGetActiveLang ? window.i18nGetActiveLang() : 'en';
  const lines = TRANSCRIPTIONS[activeLang] || TRANSCRIPTIONS['en'];
  let index = 0;
  
  function addTranscriptLine() {
    if (!liveSessionActive || index >= lines.length) return;
    
    const row = document.createElement('div');
    row.className = 'trans-row';
    const speaker = index === 5 ? 'Sofia' : 'Teacher';
    row.innerHTML = `
      <span class="trans-speaker">${speaker}:</span>
      <span class="trans-text">${lines[index]}</span>
    `;
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    
    if (index % 3 === 0) {
      addChatMessage(speaker, lines[index], false);
    }
    
    index++;
    setTimeout(addTranscriptLine, 8000 + Math.random() * 4000);
  }
  
  setTimeout(addTranscriptLine, 3000);
}

// Whiteboard Draw
function initWhiteboard() {
  whiteboardCanvas = document.getElementById('classroom-whiteboard');
  if (!whiteboardCanvas) return;
  whiteboardCtx = whiteboardCanvas.getContext('2d');
  
  document.getElementById('whiteboard-color').addEventListener('change', (e) => drawColor = e.target.value);
  document.getElementById('whiteboard-size').addEventListener('change', (e) => drawSize = e.target.value);
  
  function getMousePos(e) {
    const rect = whiteboardCanvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (whiteboardCanvas.width / rect.width),
      y: (e.clientY - rect.top) * (whiteboardCanvas.height / rect.height)
    };
  }
  
  whiteboardCanvas.addEventListener('mousedown', (e) => {
    isDrawing = true;
    const pos = getMousePos(e);
    whiteboardCtx.beginPath();
    whiteboardCtx.moveTo(pos.x, pos.y);
  });
  
  whiteboardCanvas.addEventListener('mousemove', (e) => {
    if (!isDrawing) return;
    const pos = getMousePos(e);
    whiteboardCtx.lineTo(pos.x, pos.y);
    whiteboardCtx.strokeStyle = drawColor;
    whiteboardCtx.lineWidth = drawSize;
    whiteboardCtx.lineCap = 'round';
    whiteboardCtx.stroke();
  });
  
  window.addEventListener('mouseup', () => isDrawing = false);
}

function resizeWhiteboard() {
  if (!whiteboardCanvas) return;
  const parent = whiteboardCanvas.parentElement;
  whiteboardCanvas.width = parent.clientWidth;
  whiteboardCanvas.height = parent.clientHeight - 40;
  clearWhiteboard();
}

function clearWhiteboard() {
  if (!whiteboardCtx || !whiteboardCanvas) return;
  whiteboardCtx.fillStyle = '#080808';
  whiteboardCtx.fillRect(0, 0, whiteboardCanvas.width, whiteboardCanvas.height);
}

async function uploadClassroomFile(input) {
  if (!input.files || input.files.length === 0) return;
  const file = input.files[0];
  const listContainer = document.getElementById('shared-files-list');
  
  const item = document.createElement('div');
  item.className = 'file-item';
  item.innerHTML = `
    <span class="file-item-name" style="color:var(--g);">${file.name} (Uploading...)</span>
  `;
  listContainer.appendChild(item);
  
  const sb = window.currentTeacher?.supabase;
  if (sb && currentSessionId) {
    try {
      const filePath = `shared/${currentSessionId}/${Date.now()}_${file.name}`;
      const { data, error } = await sb.storage
        .from('session-notes-pdfs')
        .upload(filePath, file);
        
      if (error) throw error;
      
      item.innerHTML = `
        <span class="file-item-name">${file.name}</span>
        <span style="color:#22c55e;font-size:11px;font-weight:700;">Uploaded</span>
      `;
      return;
    } catch (e) {
      console.warn('Supabase storage upload error, falling back to mock:', e);
    }
  }
  
  setTimeout(() => {
    item.innerHTML = `
      <span class="file-item-name">${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)</span>
      <a class="file-item-dl" href="#" onclick="alert('Downloading uploaded file...')">Download</a>
    `;
  }, 1000);
}

/* ═══ AUTH GUARD + INIT ═══ */
(async () => {
  // ─ 1. Bootstrap Supabase client ─────────────────────────────────────────────────
  const { createClient } = window.supabase;
  const cfg = window.ALIMUN_CONFIG || {};
  const _sb = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
    auth: { autoRefreshToken: true, persistSession: true, storageKey: 'alimun-auth' },
  });

  // ─ 2. Session check ─────────────────────────────────────────────────────────
  const { data: { session } } = await _sb.auth.getSession();

  if (!session) {
    window.location.href = 'signin.html';
    return;
  }

  // ─ 3. Role check ───────────────────────────────────────────────────────────
  const role = session.user?.user_metadata?.role || '';
  if (role !== 'teacher') {
    window.location.href = role === 'student' ? 'student-dashboard.html' :
                          role === 'admin' ? 'admin.html' : 'signin.html';
    return;
  }

  // ─ 4. Teacher profile status check ────────────────────────────────────────
  const { data: profile } = await _sb
    .from('teacher_profiles')
    .select('*')
    .eq('user_id', session.user.id)
    .single();

  if (!profile || profile.status !== 'approved') {
    window.location.href = 'signin.html';
    return;
  }

  // ─ 5. Expose global currentTeacher ─────────────────────────────────────────
  window.currentTeacher = {
    id:       session.user.id,
    email:    session.user.email,
    role:     'teacher',
    name:     profile.full_name || session.user.user_metadata?.full_name || session.user.email,
    profile:  profile,
    session:  session,
    supabase: _sb,
  };

  // Populate sidebar user details
  const tName = window.currentTeacher.name;
  const initials = tName.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  const location = profile.location || 'Madrid, Spain';
  document.getElementById('sb-user-name').textContent = tName;
  document.getElementById('sb-user-av').textContent = initials;
  document.getElementById('sb-user-loc').textContent = location;

  // ─ 6. Wire sign-out ─────────────────────────────────────────────────────────
  window.__teacherSignOut = async function() {
    await _sb.auth.signOut();
    window.location.href = 'signin.html';
  };

  // ─ 7. Fetch dynamic data & Boot dashboard ───────────────────────────────────
  await initTeacherData();
  nav('overview');

  // ─ 8. 5-minute session data refresh ─────────────────────────────────────────
  setInterval(async () => {
    try {
      await initTeacherData();
      // Re-render overview if currently visible (refreshes attendance count & room URL)
      if (document.querySelector('.sb-a[data-v="overview"]')?.classList.contains('on')) {
        await vOverview();
      }
    } catch (e) { /* silent — non-critical background refresh */ }
  }, 5 * 60 * 1000);
})();
