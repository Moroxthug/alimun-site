<style>
:root{--g:#ceff65;--b:#080808;--sb:258px;--sbc:68px;--ease:cubic-bezier(.4,0,.2,1);--body:'Satoshi',sans-serif;--disp:'Anton',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;}
body{font-family:var(--body);color:var(--b);background:#f0efe9;}
.sb{position:fixed;left:0;top:0;bottom:0;width:var(--sb);background:#fff;border-right:1px solid rgba(0,0,0,.07);display:flex;flex-direction:column;z-index:30;transition:width .22s var(--ease);overflow:hidden;}
.sb.col{width:var(--sbc);}
.sb-top{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 1.125rem 1.25rem;flex-shrink:0;min-height:72px;}
.sb-lf{display:flex;align-items:center;}
.sb-li{display:none;align-items:center;justify-content:center;width:36px;}
.sb.col .sb-lf{display:none;}.sb.col .sb-li{display:flex;}.sb.col .sb-top{justify-content:center;padding:1.375rem .75rem;}
.sb-tgl{width:28px;height:28px;border-radius:50%;background:#f5f4f0;border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .16s;flex-shrink:0;}
.sb-tgl:hover{background:#eae9e3;}
.sb-tgl svg{width:14px;height:14px;stroke:#888;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sb.col .sb-tgl{display:none;}
.sb-nav{flex:1;padding:0 .625rem;overflow-y:auto;overflow-x:hidden;}
.sb-sec{display:flex;align-items:center;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,0,0,.25);padding:.75rem .625rem .2rem;}
.sb-sec span{transition:opacity .18s,max-width .22s var(--ease);max-width:200px;overflow:hidden;white-space:nowrap;}
.sb.col .sb-sec span{opacity:0;max-width:0;}
.sb-a{display:flex;align-items:center;gap:.7rem;padding:.6rem .75rem;border-radius:.5rem;color:#777;font-size:.83rem;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;white-space:nowrap;transition:background .15s,color .15s;margin-bottom:.06rem;position:relative;}
.sb-a svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.sb-a:hover{background:#f5f4f0;color:var(--b);}
.sb-a.on{background:var(--b);color:#fff;font-weight:700;}
.sb-a.on svg{stroke:#fff;}
.sb-lbl{transition:opacity .15s,max-width .22s var(--ease);max-width:200px;overflow:hidden;}
.sb.col .sb-lbl{opacity:0;max-width:0;}
.sb.col .sb-a{justify-content:center;padding:.6rem 0;gap:0;}
.sb.col .sb-a.on::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:3px;height:60%;border-radius:2px 0 0 2px;background:var(--b);}
.sb-bot{flex-shrink:0;padding:.875rem .75rem 1.5rem;border-top:1px solid rgba(0,0,0,.07);overflow:hidden;}
.sb-role{background:#f5f4f0;border-radius:.75rem;padding:.7rem .875rem;margin-bottom:.875rem;transition:opacity .15s,max-height .22s var(--ease),margin .22s var(--ease),padding .22s var(--ease);max-height:80px;}
.sb.col .sb-role{opacity:0;max-height:0;margin:0;padding:0;}
.sb-role-l{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-bottom:.15rem;}
.sb-role-v{font-family:var(--disp);font-size:.9rem;color:var(--b);text-transform:uppercase;letter-spacing:.03em;}
.sb-role-s{font-size:.66rem;color:#bbb;margin-top:.08rem;}
.sb-user{display:flex;align-items:center;gap:.75rem;}
.sb-av{width:34px;height:34px;border-radius:50%;background:var(--g);color:var(--b);font-weight:900;font-size:.78rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-ui{overflow:hidden;transition:opacity .15s,max-width .22s var(--ease);max-width:160px;}
.sb.col .sb-ui{opacity:0;max-width:0;}
.sb-un{font-size:.83rem;font-weight:700;color:var(--b);line-height:1.2;white-space:nowrap;}
.sb-us{font-size:.68rem;color:#aaa;margin-top:.06rem;white-space:nowrap;}
.sb.col .sb-bot{padding:.875rem .375rem 1.5rem;}
.sb.col .sb-user{justify-content:center;}
.main{margin-left:var(--sb);height:100vh;overflow-y:auto;transition:margin-left .22s var(--ease);}
.main.col{margin-left:var(--sbc);}
#content{padding:2rem 2.25rem 3rem;transition:opacity .18s ease;}
.pg-h1{font-family:var(--disp);font-size:2rem;text-transform:uppercase;line-height:1.05;letter-spacing:-.01em;}
.pg-sub{font-size:.84rem;color:#888;margin-top:.3rem;}
.pg-head{margin-bottom:1.75rem;}
.sec-t{font-family:var(--disp);font-size:.95rem;text-transform:uppercase;letter-spacing:.04em;}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem;}
.sh-a{font-size:.75rem;color:#aaa;cursor:pointer;font-weight:500;}
.sh-a:hover{color:var(--b);}
.card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:1.125rem;padding:1.375rem;}
.card.dark{background:var(--b);color:#fff;border:none;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;}
.mb{margin-bottom:1.25rem;}
.mb2{margin-bottom:1.75rem;}
.btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--g);color:var(--b);font-family:var(--body);font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.055em;border:none;border-radius:5rem;padding:.625rem 1.25rem;cursor:pointer;transition:background .22s;text-decoration:none;white-space:nowrap;line-height:1;}
.btn:hover{background:#b3e940;}
.btn.ghost{background:rgba(255,255,255,.09);color:#fff;}
.btn.ghost:hover{background:rgba(255,255,255,.16);}
.btn.out{background:transparent;color:var(--b);border:1px solid rgba(0,0,0,.14);}
.btn.out:hover{background:#f5f4f0;}
.btn.sm{padding:.42rem .9rem;font-size:.7rem;}
.btn:disabled{background:#eae9e4;color:#bbb;cursor:not-allowed;}
.pill{display:inline-flex;align-items:center;font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border-radius:5rem;padding:.2rem .625rem;white-space:nowrap;}
.pill.dt{background:#fff7ed;color:#c2410c;}
.pill.ok{background:#f0fdf4;color:#15803d;}
.pill.na{background:#f8fafc;color:#94a3b8;border:1px solid #e2e8f0;}
.stat-row{display:flex;gap:1rem;margin-bottom:1.5rem;}
.stat-b{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:1rem;padding:1.125rem 1.375rem;flex:1;}
.stat-b .v{font-family:var(--disp);font-size:1.875rem;color:var(--b);line-height:1;margin-bottom:.18rem;}
.stat-b .l{font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:#bbb;}
.stat-b.hi{background:var(--b);}
.stat-b.hi .v{color:var(--g);}
.stat-b.hi .l{color:rgba(255,255,255,.35);}
.sess-card{background:var(--b);color:#fff;border-radius:1.375rem;padding:1.75rem 2rem;margin-bottom:1.375rem;display:flex;justify-content:space-between;align-items:center;gap:2rem;position:relative;overflow:hidden;}
.sess-card::after{content:'';position:absolute;right:-120px;top:-120px;width:360px;height:360px;border-radius:50%;background:var(--g);opacity:.05;}
.s-badge{display:inline-flex;align-items:center;gap:.4rem;background:var(--g);color:var(--b);font-size:.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;border-radius:5rem;padding:.18rem .7rem;margin-bottom:.875rem;}
.s-dot{width:5px;height:5px;border-radius:50%;background:var(--b);animation:blink 1.4s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.s-title{font-family:var(--disp);font-size:1.5rem;text-transform:uppercase;color:#fff;line-height:1.1;margin-bottom:.45rem;}
.s-meta{font-size:.78rem;color:rgba(255,255,255,.38);display:flex;gap:1.5rem;}
.s-meta b{color:rgba(255,255,255,.72);}
.s-r{text-align:right;flex-shrink:0;}
.cd{font-family:var(--disp);font-size:2.75rem;color:var(--g);line-height:1;font-variant-numeric:tabular-nums;}
.cd-l{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);margin:.22rem 0 1.125rem;}
.sub-card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:1rem;padding:1.1rem 1.25rem;display:flex;align-items:center;gap:.875rem;margin-bottom:.625rem;cursor:pointer;transition:all .18s;}
.sub-card:hover{border-color:rgba(0,0,0,.14);box-shadow:0 3px 18px rgba(0,0,0,.06);}
.s-av2{width:36px;height:36px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;color:var(--b);flex-shrink:0;}
.s-info{flex:1;min-width:0;}
.s-name{font-weight:700;font-size:.875rem;}
.s-detail{font-size:.74rem;color:#aaa;margin-top:.04rem;}
.stu-row{display:flex;align-items:center;gap:.875rem;padding:1rem 0;border-bottom:1px solid rgba(0,0,0,.06);}
.stu-row:last-child{border-bottom:none;}
.stu-av{width:36px;height:36px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;color:var(--b);flex-shrink:0;}
.stu-info{flex:1;}
.stu-name{font-weight:700;font-size:.875rem;}
.stu-sub{font-size:.74rem;color:#aaa;margin-top:.04rem;}
.stu-prog{width:80px;text-align:right;}
.stu-pct{font-family:var(--disp);font-size:1rem;}
.stu-bar-wrap{width:80px;height:4px;background:#eae9e4;border-radius:5rem;overflow:hidden;margin-top:.3rem;}
.stu-bar{height:100%;border-radius:5rem;background:var(--b);}
.prog-trk{height:5px;background:#eae9e4;border-radius:5rem;overflow:hidden;}
.prog-bar{height:100%;border-radius:5rem;width:0;transition:width 1.1s cubic-bezier(.215,.61,.355,1);}
.field-row{margin-bottom:.875rem;}
.field-row label{display:block;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#aaa;margin-bottom:.4rem;}
.field-row input,.field-row select,.field-row textarea{width:100%;background:#fafaf8;border:1.5px solid rgba(0,0,0,.1);border-radius:.75rem;padding:.75rem 1rem;font-family:var(--body);font-size:.88rem;color:var(--b);outline:none;transition:border-color .2s;}
.field-row input:focus,.field-row select:focus,.field-row textarea:focus{border-color:var(--b);}
.field-row textarea{min-height:100px;resize:vertical;}
.sess-row{display:flex;align-items:center;gap:1rem;padding:.875rem 0;border-bottom:1px solid rgba(0,0,0,.06);}
.sess-row:last-child{border-bottom:none;}
.sess-dot2{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sess-dot2.done{background:var(--g);}
.sess-dot2.up{background:var(--b);animation:blink 1.4s ease infinite;}
.sess-info2{flex:1;}
.sess-topic2{font-size:.875rem;font-weight:600;}
.sess-date2{font-size:.75rem;color:#aaa;margin-top:.04rem;}
.sess-b2{font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.18rem .5rem;border-radius:5rem;}
.sess-b2.done{background:#f0fdf4;color:#15803d;}
.sess-b2.up{background:var(--g);color:var(--b);}
.ov{position:fixed;inset:0;background:rgba(8,8,8,.6);backdrop-filter:blur(8px);z-index:50;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .25s;}
.ov.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:1.75rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;transform:translateY(16px) scale(.983);transition:transform .3s cubic-bezier(.215,.61,.355,1);box-shadow:0 40px 100px rgba(0,0,0,.24);}
.ov.open .modal{transform:none;}
.m-hd{padding:1.75rem 1.75rem 0;}
.m-ey{font-size:.63rem;letter-spacing:.12em;text-transform:uppercase;color:#bbb;margin-bottom:.25rem;}
.m-title{font-family:var(--disp);font-size:1.875rem;text-transform:uppercase;line-height:1.05;margin-bottom:1.375rem;border-bottom:1px solid rgba(0,0,0,.07);padding-bottom:1.375rem;}
.m-bd{padding:0 1.75rem 1.75rem;}
.g-load{text-align:center;padding:2.25rem 1.75rem 2.75rem;}
.g-spin{width:28px;height:28px;border:2.5px solid #eae9e4;border-top-color:var(--b);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .875rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.g-load p{font-size:.84rem;color:#bbb;}
.g-res{margin:0 1.75rem 1.75rem;}
.g-top{background:var(--b);border-radius:1.25rem 1.25rem 0 0;padding:1.5rem 1.625rem;display:flex;align-items:baseline;gap:.875rem;}
.g-score{font-family:var(--disp);font-size:4rem;color:var(--g);line-height:1;}
.g-sum{color:rgba(255,255,255,.7);font-size:.875rem;line-height:1.55;}
.g-bot{background:#f5f4f0;border-radius:0 0 1.25rem 1.25rem;padding:1.25rem 1.625rem;}
.g-cols{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.g-col-h{font-size:.61rem;letter-spacing:.11em;text-transform:uppercase;color:#aaa;margin-bottom:.45rem;}
.g-list{list-style:none;display:flex;flex-direction:column;gap:.3rem;}
.g-list li{font-size:.83rem;line-height:1.5;padding-left:.875rem;position:relative;color:#333;}
.g-list li::before{content:'';position:absolute;left:0;top:.54rem;width:5px;height:5px;border-radius:50%;}
.str .g-list li::before{background:#22c55e;}
.imp .g-list li::before{background:#f59e0b;}
.g-fix{margin-top:1rem;background:#fff;border-radius:.75rem;padding:.875rem 1rem;border:1px solid #e8e7e2;}
.g-fix small{display:block;font-size:.61rem;letter-spacing:.11em;text-transform:uppercase;color:#bbb;margin-bottom:.3rem;}
.g-fix p{font-size:.83rem;color:#16a34a;font-style:italic;}
.sub-text{background:#f5f4f0;border-radius:.875rem;padding:1rem 1.25rem;margin-bottom:1.25rem;font-size:.875rem;line-height:1.65;color:#444;white-space:pre-wrap;}
</style>

let sbCol=false;

async function claude(prompt,sys){const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}],...(sys?{system:sys}:{})})});const d=await r.json();return(d.content||[]).map(b=>b.type==='text'?b.text:'').join('');}
const ov=document.getElementById('ov'),modal=document.getElementById('modal');
ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
function openModal(h){modal.innerHTML=h;ov.classList.add('open');}
function closeModal(){ov.classList.remove('open');setTimeout(()=>modal.innerHTML='',280);}

function gradeModal(s){
  openModal(`<div class="m-hd"><div class="m-ey">${s.subType} · ${s.n}</div><div class="m-title">${s.sub}</div></div><div class="m-bd"><div style="font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:#aaa;margin-bottom:.5rem;">Student's submission · ${s.subTime}</div><div class="sub-text">${s.subText}</div><button class="btn" id="grade-ai-btn" onclick="runGrade(this,'${s.n}','${s.subType}',\`${s.subText.replace(/`/g,"'")}\`)">Grade with AI</button><div id="grade-out"></div></div>`);
}
async function runGrade(btn,name,type,text){
  btn.disabled=true;btn.textContent='Grading…';
  document.getElementById('grade-out').innerHTML=`<div class="g-load" style="margin-top:1.25rem;"><div class="g-spin"></div><p>Analysing ${name}'s ${type.toLowerCase()}…</p></div>`;
  try{
    const raw=await claude(`Student: ${name}\nSubmission:\n"${text}"\n\nGrade this fairly. Respond ONLY with raw JSON:\n{"score":<0-100>,"summary":"<one sentence>","strengths":["<point>","<point>"],"improvements":["<actionable point>","<actionable point>"],"corrected_excerpt":"<one corrected sentence or empty string>"}`,`You are an expert Spanish language teacher grading a student's ${type.toLowerCase()} submission.`);
    const r=JSON.parse(raw.replace(/```json|```/g,'').trim());
    document.getElementById('grade-out').innerHTML=`<div style="margin-top:1.25rem;"><div class="g-res" style="margin:0;"><div class="g-top"><div class="g-score">${r.score}</div><div class="g-sum">${r.summary}</div></div><div class="g-bot"><div class="g-cols"><div class="str"><div class="g-col-h">Strengths</div><ul class="g-list">${r.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div><div class="imp"><div class="g-col-h">Work on next</div><ul class="g-list">${r.improvements.map(s=>`<li>${s}</li>`).join('')}</ul></div></div>${r.corrected_excerpt?`<div class="g-fix"><small>Example correction</small><p>"${r.corrected_excerpt}"</p></div>`:''}</div></div><div style="margin-top:1.25rem;display:flex;gap:.625rem;"><button class="btn" onclick="closeModal()">Send feedback to student</button><button class="btn out" onclick="closeModal()">Cancel</button></div></div>`;
  }catch(e){document.getElementById('grade-out').innerHTML=`<p style="color:#dc2626;font-size:.84rem;margin-top:1rem;">Something went wrong. Try again.</p>`;btn.disabled=false;btn.textContent='Grade with AI';}
}

function vOverview(){
  const now=new Date();const h=now.getHours();
  
  const translations = window.ALIMUN_TRANSLATIONS || {};
  const lang = window.i18nGetActiveLang ? window.i18nGetActiveLang() : 'en';

  const greetKey = h<12?'greet_morning':h<18?'greet_afternoon':'greet_evening';
  const greet = dict[greetKey] || (h<12?'Good morning':h<18?'Good afternoon':'Good evening');
  const name = window.currentTeacher ? window.currentTeacher.name.split(' ')[0] : 'Sarah';
  const welcomeStr = (dict['teacher_welcome'] || 'Welcome back, {name}').replace('{name}', name);
  
  const locales = { en: 'en-GB', es: 'es-ES', fr: 'fr-FR', de: 'de-DE', pt: 'pt-PT', zh: 'zh-CN', ar: 'ar-EG' };
  const dateStr = now.toLocaleDateString(locales[lang] || 'en-GB', {weekday:'long',day:'numeric',month:'long'});
  
  const target=new Date(Date.now()+(1*3600+47*60+23)*1000);
  
  document.getElementById('content').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.5rem;gap:1.5rem;">
      <div><div style="font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-bottom:.18rem;">${dateStr}</div><h1 class="pg-h1">${welcomeStr}</h1></div>
      <button class="btn sm" style="flex-shrink:0;" onclick="createAssignment()" data-i18n="teacher_action_create">${dict.teacher_action_create || '+ Create new'}</button>
    </div>
    <div class="stat-row mb">

async function saveSettings() {
  const fullname = document.getElementById('set-fullname').value;
  const location = document.getElementById('set-location').value;
  if (!fullname) return;

  const btn = document.querySelector('[data-i18n="dash_save_changes"]');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const _sb = window.currentTeacher.supabase;
    const { error } = await _sb
      .from('teacher_profiles')
      .update({ full_name: fullname, location: location })
      .eq('user_id', window.currentTeacher.id);

    if (error) throw error;

    // Update local state
    window.currentTeacher.name = fullname;
    window.currentTeacher.profile.full_name = fullname;
    window.currentTeacher.profile.location = location;

    // Update sidebar UI
    document.getElementById('sb-user-name').textContent = fullname;
    const initials = fullname.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('sb-user-av').textContent = initials;
    document.getElementById('sb-user-loc').textContent = location;

    alert('Profile updated successfully!');
  } catch (e) {
    console.error(e);
    alert('Error saving changes: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

/* ═══ AUTH GUARD + INIT ═══ */
(async () => {
  // ─ 1. Bootstrap Supabase client ─────────────────────────────────────────────────
  const { createClient } = window.supabase;
  const cfg = window.ALIMUN_CONFIG || {};
  const _sb = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
    auth: { autoRefreshToken: true, persistSession: true, storageKey: 'alimun-auth' },
  });

  // ─ 2. Session check ─────────────────────────────────────────────────────────
  const { data: { session } } = await _sb.auth.getSession();

  if (!session) {
    window.location.href = 'signin.html';
    return;
  }

  // ─ 3. Role check ───────────────────────────────────────────────────────────
  const role = session.user?.user_metadata?.role || '';
  if (role !== 'teacher') {
    // Student or admin landed here — send them to the right place
    window.location.href = role === 'student' ? 'student-dashboard.html' :
                          role === 'admin' ? 'admin.html' : 'signin.html';
    return;
  }

  // ─ 4. Teacher profile status check ────────────────────────────────────────
  const { data: profile } = await _sb
    .from('teacher_profiles')
    .select('*')
    .eq('user_id', session.user.id)
    .single();

  // No profile or not approved → back to sign-in (which shows the status screen)
  if (!profile || profile.status !== 'approved') {
    window.location.href = 'signin.html';
    return;
  }

  // ─ 5. Expose global currentTeacher ─────────────────────────────────────────
  window.currentTeacher = {
    id:       session.user.id,
    email:    session.user.email,
    role:     'teacher',
    name:     profile.full_name || session.user.user_metadata?.full_name || session.user.email,
    profile:  profile,
    session:  session,
    supabase: _sb,
  };

  // Populate sidebar user details
  const tName = window.currentTeacher.name;
  const initials = tName.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  const location = profile.location || 'Madrid, Spain';
  document.getElementById('sb-user-name').textContent = tName;
  document.getElementById('sb-user-av').textContent = initials;
  document.getElementById('sb-user-loc').textContent = location;

  // ─ 6. Wire sign-out ─────────────────────────────────────────────────────────
  window.__teacherSignOut = async function() {
    await _sb.auth.signOut();
    window.location.href = 'signin.html';
  };

  // ─ 7. Boot dashboard ────────────────────────────────────────────────────────
  nav('overview');
})();;
</script>
