<style>
:root{--g:#ceff65;--b:#080808;--sb:258px;--sbc:68px;--ease:cubic-bezier(.4,0,.2,1);--body:'Satoshi',sans-serif;--disp:'Anton',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;}
body{font-family:var(--body);color:var(--b);background:#f0efe9;}

/* SIDEBAR */
.sb{position:fixed;left:0;top:0;bottom:0;width:var(--sb);background:#fff;border-right:1px solid rgba(0,0,0,.07);display:flex;flex-direction:column;z-index:30;transition:width .22s var(--ease);overflow:hidden;}
.sb.col{width:var(--sbc);}
.sb-top{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 1.125rem 1.25rem;flex-shrink:0;min-height:72px;}
.sb-lf{display:flex;align-items:center;}
.sb-li{display:none;align-items:center;justify-content:center;width:36px;}
.sb.col .sb-lf{display:none;}
.sb.col .sb-li{display:flex;}
.sb.col .sb-top{justify-content:center;padding:1.375rem .75rem;}
.sb-tgl{width:28px;height:28px;border-radius:50%;background:#f5f4f0;border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .16s;flex-shrink:0;}
.sb-tgl:hover{background:#eae9e3;}
.sb-tgl svg{width:14px;height:14px;stroke:#888;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sb.col .sb-tgl{display:none;}
.sb-nav{flex:1;padding:0 .625rem;overflow-y:auto;overflow-x:hidden;}
.sb-sec{display:flex;align-items:center;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,0,0,.25);padding:.75rem .625rem .2rem;}
.sb-sec span{transition:opacity .18s,max-width .22s var(--ease);max-width:200px;overflow:hidden;white-space:nowrap;}
.sb.col .sb-sec span{opacity:0;max-width:0;}
.sb-a{display:flex;align-items:center;gap:.7rem;padding:.6rem .75rem;border-radius:.5rem;color:#777;font-size:.83rem;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;white-space:nowrap;transition:background .15s,color .15s;margin-bottom:.06rem;position:relative;}
.sb-a svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.sb-a:hover{background:#f5f4f0;color:var(--b);}
.sb-a.on{background:var(--b);color:#fff;font-weight:700;}
.sb-a.on svg{stroke:#fff;}
.sb-lbl{transition:opacity .15s,max-width .22s var(--ease);max-width:200px;overflow:hidden;}
.sb.col .sb-lbl{opacity:0;max-width:0;}
.sb.col .sb-a{justify-content:center;padding:.6rem 0;gap:0;}
.sb.col .sb-a.on::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:3px;height:60%;border-radius:2px 0 0 2px;background:var(--b);}
.sb-bot{flex-shrink:0;padding:.875rem .75rem 1.5rem;border-top:1px solid rgba(0,0,0,.07);overflow:hidden;}
.sb-tier{background:#f5f4f0;border-radius:.75rem;padding:.7rem .875rem;margin-bottom:.875rem;transition:opacity .15s,max-height .22s var(--ease),margin .22s var(--ease),padding .22s var(--ease);max-height:80px;}
.sb.col .sb-tier{opacity:0;max-height:0;margin:0;padding:0;}
.sb-tier-l{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-bottom:.15rem;}
.sb-tier-v{font-family:var(--disp);font-size:.9rem;color:var(--b);text-transform:uppercase;letter-spacing:.03em;}
.sb-tier-s{font-size:.66rem;color:#bbb;margin-top:.08rem;}
.sb-user{display:flex;align-items:center;gap:.75rem;}
.sb-av{width:34px;height:34px;border-radius:50%;background:var(--g);color:var(--b);font-weight:900;font-size:.78rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-ui{overflow:hidden;transition:opacity .15s,max-width .22s var(--ease);max-width:160px;}
.sb.col .sb-ui{opacity:0;max-width:0;}
.sb-un{font-size:.83rem;font-weight:700;color:var(--b);line-height:1.2;white-space:nowrap;}
.sb-us{font-size:.68rem;color:#aaa;margin-top:.06rem;white-space:nowrap;}
.sb.col .sb-bot{padding:.875rem .375rem 1.5rem;}
.sb.col .sb-user{justify-content:center;}

/* MAIN */
.main{margin-left:var(--sb);height:100vh;overflow-y:auto;transition:margin-left .22s var(--ease);}
.main.col{margin-left:var(--sbc);}
#content{padding:2rem 2.25rem 3rem;transition:opacity .18s ease;}

/* TYPE */
.pg-h1{font-family:var(--disp);font-size:2rem;text-transform:uppercase;line-height:1.05;letter-spacing:-.01em;}
.pg-sub{font-size:.84rem;color:#888;margin-top:.3rem;}
.pg-head{margin-bottom:1.75rem;}
.sec-t{font-family:var(--disp);font-size:.95rem;text-transform:uppercase;letter-spacing:.04em;}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem;}
.sh-a{font-size:.75rem;color:#aaa;cursor:pointer;font-weight:500;}
.sh-a:hover{color:var(--b);}

/* CARDS */
.card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:1.125rem;padding:1.375rem;}
.card.dark{background:var(--b);color:#fff;border:none;}
.card.green{background:var(--g);color:var(--b);border:none;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;}
.gap{gap:1.25rem;}
.gab{display:grid;grid-template-columns:1fr 344px;gap:1.25rem;}
.mb{margin-bottom:1.25rem;}
.mb2{margin-bottom:1.75rem;}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--g);color:var(--b);font-family:var(--body);font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.055em;border:none;border-radius:5rem;padding:.625rem 1.25rem;cursor:pointer;transition:background .22s;text-decoration:none;white-space:nowrap;line-height:1;}
.btn:hover{background:#b3e940;}
.btn.ghost{background:rgba(255,255,255,.09);color:#fff;}
.btn.ghost:hover{background:rgba(255,255,255,.16);}
.btn.out{background:transparent;color:var(--b);border:1px solid rgba(0,0,0,.14);}
.btn.out:hover{background:#f5f4f0;}
.btn.sm{padding:.42rem .9rem;font-size:.7rem;}
.btn:disabled{background:#eae9e4;color:#bbb;cursor:not-allowed;}
.btn.full{width:100%;justify-content:center;}

/* PILL */
.pill{display:inline-flex;align-items:center;font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border-radius:5rem;padding:.2rem .625rem;white-space:nowrap;}
.pill.dt{background:#fff7ed;color:#c2410c;}
.pill.up{background:#f0f9ff;color:#0369a1;}
.pill.ok{background:#f0fdf4;color:#15803d;}
.pill.na{background:#f8fafc;color:#94a3b8;border:1px solid #e2e8f0;}

/* STATS ROW */
.stat-row{display:flex;gap:1rem;margin-bottom:1.5rem;}
.stat-b{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:1rem;padding:1.125rem 1.375rem;flex:1;}
.stat-b .v{font-family:var(--disp);font-size:1.875rem;color:var(--b);line-height:1;margin-bottom:.18rem;}
.stat-b .l{font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:#bbb;}
.stat-b.hi{background:var(--b);}
.stat-b.hi .v{color:var(--g);}
.stat-b.hi .l{color:rgba(255,255,255,.35);}

/* SESSION CARD */
.sess{background:var(--b);color:#fff;border-radius:1.375rem;padding:1.75rem 2rem;margin-bottom:1.375rem;display:flex;justify-content:space-between;align-items:center;gap:2rem;position:relative;overflow:hidden;}
.sess::after{content:'';position:absolute;right:-120px;top:-120px;width:360px;height:360px;border-radius:50%;background:var(--g);opacity:.05;pointer-events:none;}
.s-badge{display:inline-flex;align-items:center;gap:.4rem;background:var(--g);color:var(--b);font-size:.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;border-radius:5rem;padding:.18rem .7rem;margin-bottom:.875rem;}
.s-dot{width:5px;height:5px;border-radius:50%;background:var(--b);animation:blink 1.4s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.s-title{font-family:var(--disp);font-size:1.5rem;text-transform:uppercase;color:#fff;line-height:1.1;margin-bottom:.45rem;}
.s-meta{font-size:.78rem;color:rgba(255,255,255,.38);display:flex;gap:1.5rem;flex-wrap:wrap;}
.s-meta b{color:rgba(255,255,255,.72);}
.s-r{text-align:right;flex-shrink:0;}
.cd{font-family:var(--disp);font-size:2.75rem;color:var(--g);line-height:1;letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
.cd-l{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);margin:.22rem 0 1.125rem;}
.s-acts{display:flex;gap:.5rem;justify-content:flex-end;}

/* DASH HEADER */
.dash-hd{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.5rem;gap:1.5rem;}
.dash-sub{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-bottom:.18rem;}
.dash-h1{font-family:var(--disp);font-size:2.25rem;text-transform:uppercase;line-height:1.05;letter-spacing:-.01em;}
.dstats{display:flex;align-items:center;}
.dst{display:flex;align-items:center;gap:.4rem;padding:0 1.25rem;border-right:1px solid rgba(0,0,0,.1);font-size:.82rem;}
.dst:last-child{border-right:none;padding-right:0;}
.dst strong{font-weight:800;font-size:.88rem;font-variant-numeric:tabular-nums;}
.dst span{color:#aaa;font-size:.76rem;}

/* ASSIGNMENT CARDS */
.alist{display:flex;flex-direction:column;gap:.625rem;}
.ac{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:1rem;padding:1.1rem 1.25rem;display:flex;align-items:center;gap:.875rem;cursor:pointer;transition:all .18s;}
.ac:hover{border-color:rgba(0,0,0,.14);box-shadow:0 3px 18px rgba(0,0,0,.06);}
.ac-ico{width:40px;height:40px;border-radius:.75rem;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.ac-ico.e{background:#eff6ff;}
.ac-ico.t{background:#f0fdf4;}
.ac-ico.s{background:#fdf4ff;}
.ac-ico.h{background:#fffbeb;}
.ac-info{flex:1;min-width:0;}
.ac-type{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#ccc;margin-bottom:.04rem;}
.ac-name{font-weight:700;font-size:.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-due{font-size:.74rem;color:#bbb;margin-top:.04rem;}
.ac-r{flex-shrink:0;display:flex;align-items:center;gap:.5rem;}

/* QUIZ */
.qcard{background:var(--b);border-radius:1.125rem;padding:1.5rem;color:#fff;}
.q-trk{height:3px;background:rgba(255,255,255,.08);border-radius:5rem;margin-bottom:1.25rem;overflow:hidden;}
.q-fill{height:100%;background:var(--g);border-radius:5rem;transition:width .35s ease;}
.q-lbl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:.625rem;}
.q-text{font-size:.9rem;line-height:1.55;color:rgba(255,255,255,.88);margin-bottom:1rem;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:.45rem;}
.q-opt{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:.625rem;padding:.7rem .975rem;font-size:.83rem;color:rgba(255,255,255,.68);cursor:pointer;text-align:left;font-family:var(--body);transition:all .15s;width:100%;}
.q-opt:hover:not(:disabled){background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18);color:#fff;}
.q-opt.yes{background:rgba(206,255,101,.1);border-color:var(--g);color:var(--g);}
.q-opt.no{background:rgba(239,68,68,.1);border-color:#f87171;color:#f87171;}
.q-opt:disabled{cursor:default;}
.q-done{text-align:center;padding:.5rem 0;}
.q-done-sc{font-family:var(--disp);font-size:3rem;color:var(--g);line-height:1;}
.q-done-lbl{font-size:.7rem;color:rgba(255,255,255,.3);margin-top:.2rem;}
.q-done-msg{font-size:.79rem;color:rgba(255,255,255,.45);margin-top:.5rem;line-height:1.5;}

/* PROGRESS BARS */
.prog-lbl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.375rem;}
.prog-name{font-size:.78rem;font-weight:600;}
.prog-pct{font-family:var(--disp);font-size:1rem;}
.prog-trk{height:5px;background:#eae9e4;border-radius:5rem;overflow:hidden;}
.prog-bar{height:100%;border-radius:5rem;width:0;transition:width 1.1s cubic-bezier(.215,.61,.355,1);}

/* COURSE CARDS */
.course-card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:1.125rem;padding:1.5rem;transition:all .18s;cursor:pointer;}
.course-card:hover{border-color:rgba(0,0,0,.14);box-shadow:0 4px 20px rgba(0,0,0,.07);}
.course-stripe{width:40px;height:5px;border-radius:5rem;margin-bottom:1rem;}
.course-name{font-family:var(--disp);font-size:1.25rem;text-transform:uppercase;line-height:1.1;margin-bottom:.3rem;}
.course-meta{font-size:.78rem;color:#aaa;margin-bottom:1rem;}
.course-prog-lbl{display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.4rem;}
.course-prog-lbl span:first-child{font-weight:600;}
.course-prog-lbl span:last-child{color:#aaa;}

/* FILTER TABS */
.filter-tabs{display:flex;gap:.375rem;margin-bottom:1.25rem;}
.ftab{padding:.5rem .875rem;border-radius:5rem;border:1px solid rgba(0,0,0,.1);background:transparent;font-family:var(--body);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#aaa;cursor:pointer;transition:all .16s;}
.ftab.on{background:var(--b);color:#fff;border-color:var(--b);}

/* FLASHCARD */
.flash-wrap{perspective:1200px;height:170px;cursor:pointer;margin-bottom:.875rem;}
.flash-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s ease;position:relative;}
.flash-inner.flipped{transform:rotateY(180deg);}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center;}
.flash-front{background:var(--b);}
.flash-back{background:var(--g);transform:rotateY(180deg);}
.flash-word{font-family:var(--disp);font-size:1.875rem;text-transform:uppercase;color:#fff;line-height:1;}
.flash-hint{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:.5rem;}
.flash-back .flash-word{color:var(--b);}
.flash-back .flash-hint{color:rgba(8,8,8,.35);}
.flash-nav{display:flex;justify-content:space-between;align-items:center;margin-top:.25rem;}
.flash-counter{font-size:.72rem;color:#aaa;}
.flash-actions{display:flex;gap:.5rem;}

/* WRITING PROMPT */
.prompt-box{background:#f5f4f0;border-radius:.875rem;padding:.975rem 1.25rem;margin-bottom:1.125rem;border-left:3px solid var(--g);}
.prompt-box small{display:block;font-size:.61rem;letter-spacing:.11em;text-transform:uppercase;color:#bbb;margin-bottom:.35rem;}
.prompt-box p{font-size:.875rem;color:#444;line-height:1.65;}
.field-ta{width:100%;min-height:120px;resize:vertical;background:#fafaf8;border:1.5px solid rgba(0,0,0,.1);border-radius:.875rem;padding:.975rem 1.25rem;font-family:var(--body);font-size:.88rem;line-height:1.6;color:var(--b);outline:none;transition:border-color .2s;}
.field-ta:focus{border-color:var(--b);}
.field-ta::placeholder{color:#ccc;}
.ft-row{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;}

/* CHAT */
.chat-area{display:flex;flex-direction:column;gap:.875rem;height:340px;overflow-y:auto;padding:1.25rem 1.375rem;background:#f9f8f5;border-radius:1rem 1rem 0 0;}
.chat-area::-webkit-scrollbar{width:4px;}
.chat-area::-webkit-scrollbar-thumb{background:#e2e1dc;border-radius:4px;}
.chat-msg{display:flex;align-items:flex-end;gap:.625rem;}
.chat-msg.me{flex-direction:row-reverse;}
.c-av{width:28px;height:28px;border-radius:50%;background:#eae9e4;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0;color:#666;}
.chat-msg.me .c-av{background:var(--g);color:var(--b);}
.c-bub{max-width:75%;background:#fff;border-radius:1rem 1rem 1rem .25rem;padding:.75rem 1rem;font-size:.84rem;line-height:1.5;color:#333;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.chat-msg.me .c-bub{background:var(--b);color:#fff;border-radius:1rem 1rem .25rem 1rem;}
.c-time{font-size:.62rem;color:#ccc;margin-top:.2rem;text-align:right;}
.chat-msg:not(.me) .c-time{text-align:left;}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:.625rem .875rem;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:#ccc;animation:td .8s ease infinite;}
.typing-dot:nth-child(2){animation-delay:.15s;}
.typing-dot:nth-child(3){animation-delay:.3s;}
@keyframes td{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.chat-input-row{display:flex;gap:.625rem;padding:1rem 1.375rem;background:#fff;border-radius:0 0 1rem 1rem;border:1px solid rgba(0,0,0,.06);border-top:1px solid rgba(0,0,0,.07);}
.chat-input{flex:1;border:none;background:transparent;font-family:var(--body);font-size:.88rem;color:var(--b);outline:none;}
.chat-input::placeholder{color:#ccc;}

/* TEACHER PROFILE */
.teacher-card{background:var(--b);color:#fff;border-radius:1.375rem;padding:1.75rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1.75rem;}
.t-av{width:72px;height:72px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:1.5rem;color:var(--b);flex-shrink:0;}
.t-name{font-family:var(--disp);font-size:1.5rem;text-transform:uppercase;color:#fff;line-height:1;margin-bottom:.35rem;}
.t-role{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.625rem;}
.t-badges{display:flex;gap:.5rem;flex-wrap:wrap;}
.t-badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:.5rem;padding:.25rem .625rem;font-size:.72rem;color:rgba(255,255,255,.6);}
.sess-row{display:flex;align-items:center;gap:1rem;padding:.875rem 0;border-bottom:1px solid rgba(0,0,0,.06);}
.sess-row:last-child{border-bottom:none;}
.sess-dot2{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sess-dot2.done{background:#ceff65;}
.sess-dot2.up{background:var(--b);animation:blink 1.4s ease infinite;}
.sess-info{flex:1;}
.sess-topic{font-size:.875rem;font-weight:600;}
.sess-date{font-size:.75rem;color:#aaa;margin-top:.04rem;}
.sess-badge2{font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.18rem .5rem;border-radius:5rem;}
.sess-badge2.done{background:#f0fdf4;color:#15803d;}
.sess-badge2.up{background:#ceff65;color:var(--b);}

/* SETTINGS */
.setting-section{margin-bottom:1.75rem;}
.setting-title{font-family:var(--disp);font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:#aaa;margin-bottom:.875rem;}
.field-row{margin-bottom:.875rem;}
.field-row label{display:block;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#aaa;margin-bottom:.4rem;}
.field-row input,.field-row select{width:100%;background:#fafaf8;border:1.5px solid rgba(0,0,0,.1);border-radius:.75rem;padding:.75rem 1rem;font-family:var(--body);font-size:.88rem;color:var(--b);outline:none;transition:border-color .2s;}
.field-row input:focus,.field-row select:focus{border-color:var(--b);}
.tog-row{display:flex;justify-content:space-between;align-items:center;padding:.875rem 0;border-bottom:1px solid rgba(0,0,0,.06);}
.tog-row:last-child{border-bottom:none;}
.tog-row .tl{font-size:.875rem;font-weight:600;}
.tog-row .ts{font-size:.78rem;color:#aaa;margin-top:.06rem;}
.tog{width:40px;height:22px;border-radius:5rem;background:#e2e1dc;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tog.on{background:var(--b);}
.tog::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;}
.tog.on::after{left:21px;}

/* WEEKLY ACTIVITY */
.activity-grid{display:flex;gap:.375rem;margin-top:.875rem;}
.act-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:.25rem;}
.act-dot{width:100%;aspect-ratio:1;border-radius:.3rem;background:#f0efe9;}
.act-dot.l1{background:#e0ffa0;}
.act-dot.l2{background:#b3e940;}
.act-dot.l3{background:var(--b);}
.act-lbl{font-size:.58rem;color:#ccc;text-transform:uppercase;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(8,8,8,.6);backdrop-filter:blur(8px);z-index:50;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .25s;}
.ov.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:1.75rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;transform:translateY(16px) scale(.983);transition:transform .3s cubic-bezier(.215,.61,.355,1);box-shadow:0 40px 100px rgba(0,0,0,.24);}
.ov.open .modal{transform:none;}
.m-hd{padding:1.75rem 1.75rem 0;}
.m-ey{font-size:.63rem;letter-spacing:.12em;text-transform:uppercase;color:#bbb;margin-bottom:.25rem;}
.m-title{font-family:var(--disp);font-size:1.875rem;text-transform:uppercase;line-height:1.05;margin-bottom:1.375rem;border-bottom:1px solid rgba(0,0,0,.07);padding-bottom:1.375rem;}
.m-bd{padding:0 1.75rem 1.75rem;}
.g-load{text-align:center;padding:2.25rem 1.75rem 2.75rem;}
.g-spin{width:28px;height:28px;border:2.5px solid #eae9e4;border-top-color:var(--b);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .875rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.g-load p{font-size:.84rem;color:#bbb;}
.g-res{margin:0 1.75rem 1.75rem;}
.g-top{background:var(--b);border-radius:1.25rem 1.25rem 0 0;padding:1.5rem 1.625rem;display:flex;align-items:baseline;gap:.875rem;}
.g-score{font-family:var(--disp);font-size:4rem;color:var(--g);line-height:1;}
.g-sum{color:rgba(255,255,255,.7);font-size:.875rem;line-height:1.55;}
.g-bot{background:#f5f4f0;border-radius:0 0 1.25rem 1.25rem;padding:1.25rem 1.625rem;}
.g-cols{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.g-col-h{font-size:.61rem;letter-spacing:.11em;text-transform:uppercase;color:#aaa;margin-bottom:.45rem;}
.g-list{list-style:none;display:flex;flex-direction:column;gap:.3rem;}
.g-list li{font-size:.83rem;line-height:1.5;padding-left:.875rem;position:relative;color:#333;}
.g-list li::before{content:'';position:absolute;left:0;top:.54rem;width:5px;height:5px;border-radius:50%;}
.str .g-list li::before{background:#22c55e;}
.imp .g-list li::before{background:#f59e0b;}
.g-fix{margin-top:1rem;background:#fff;border-radius:.75rem;padding:.875rem 1rem;border:1px solid #e8e7e2;}
.g-fix small{display:block;font-size:.61rem;letter-spacing:.11em;text-transform:uppercase;color:#bbb;margin-bottom:.3rem;}
.g-fix p{font-size:.83rem;color:#16a34a;font-style:italic;}

/* WEEKLY CHART */
.wk-lbl{font-size:.65rem;color:#bbb;text-align:center;margin-top:.2rem;}

/* AI INSIGHT */
.insight-card{background:var(--b);color:#fff;border-radius:1.125rem;padding:1.375rem;margin-top:1.25rem;}
.insight-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.08);border-radius:.5rem;padding:.25rem .625rem;font-size:.63rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:.75rem;}
.insight-text{font-size:.88rem;line-height:1.6;color:rgba(255,255,255,.8);}
.insight-spin{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:.5rem 0;}
</style>

/* ═══ SHARED API ═══ */
async function claude(prompt,sys){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}],...(sys?{system:sys}:{})})});
  const d=await r.json();
  return (d.content||[]).map(b=>b.type==='text'?b.text:'').join('');
}

        <button class="btn out sm" style="color:#dc2626;border-color:#dc2626;" onclick="window.__signOut && window.__signOut()" data-i18n="student_sb_logout">Sign out</button>
      </div>
    </div>
    <div style="height:2.5rem"></div>`;
  if (window.i18nTranslatePage) {
    window.i18nTranslatePage();
  }
}

/* ═══ AUTH GUARD + INIT ═══ */
(async () => {
  // ─ 1. Auth guard ────────────────────────────────────────────────────────────
  const { createClient } = window.supabase;
  const cfg = window.ALIMUN_CONFIG || {};
  const _sb = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
    auth: { autoRefreshToken: true, persistSession: true, storageKey: 'alimun-auth' },
  });

  const { data: { session } } = await _sb.auth.getSession();

  if (!session) {
    window.location.href = 'signin.html';
    return;
  }

  const role = session.user?.user_metadata?.role || '';
  if (role !== 'student') {
    window.location.href = role === 'teacher' ? 'teacher-dashboard.html' :
                          role === 'admin' ? 'admin.html' : 'signin.html';
    return;
  }

  // ─ 2. Fetch student profile ──────────────────────────────────────────────────
  let userProfile = null;
  try {
    const { data, error } = await _sb
      .from('student_profiles')
      .select('*')
      .eq('user_id', session.user.id)
      .maybeSingle();
    if (!error && data) {
      userProfile = data;
    }
  } catch (e) {
    console.error('Error fetching student profile:', e);
  }

  // Get active tier from local storage override (if set for testing) or DB profile
  let activeTier = localStorage.getItem(`alimun:tier_override:${session.user.id}`) || userProfile?.tier || 'focused';

  // ─ 3. Expose global currentUser ──────────────────────────────────────────────
  window.currentUser = {
    id:       session.user.id,
    email:    session.user.email,
    role:     role,
    name:     userProfile?.full_name || session.user.user_metadata?.full_name || session.user.email,
    profile:  userProfile,
    tier:     activeTier,
    session:  session,
    supabase: _sb,
  };

  // ─ 4. Sync profile information with UI ───────────────────────────────────────
  window.syncUserProfileUI = function() {
    const p = window.currentUser.profile;
    const tier = window.currentUser.tier;
    const name = window.currentUser.name;
    
    const nameEl = document.getElementById('sb-user-fullname');
    if (nameEl) nameEl.textContent = name;
    
    const avEl = document.getElementById('sb-user-avatar');
    if (avEl && name) {
      const parts = name.split(' ');
      const initials = parts.map(x => x[0]).join('').substring(0, 2).toUpperCase();
      avEl.textContent = initials || 'ST';
    }
    
    const detailsEl = document.getElementById('sb-user-details');
    if (detailsEl && p) {
      const langKey = 'lang_' + p.language.toLowerCase();
      const lvlKey = 'level_' + p.level.toLowerCase();
      detailsEl.innerHTML = `<span data-i18n="${langKey}">${p.language}</span> · <span data-i18n="${lvlKey}">${p.level}</span>`;
    }
    
    const tierEl = document.getElementById('sb-tier-name');
    const tierDescEl = document.getElementById('sb-tier-desc');
    if (tierEl && tierDescEl) {
      tierEl.setAttribute('data-i18n', `tier_${tier}_name`);
      tierDescEl.setAttribute('data-i18n', `student_sb_tier_desc_${tier}`);
    }
    
    if (window.i18nTranslatePage) {
      window.i18nTranslatePage();
    }
  };

  // ─ 5. Wire tier upgrade & paywall flows ─────────────────────────────────────
  window.openTierUpgradeModal = function() {
    const translations = window.ALIMUN_TRANSLATIONS || {};
    const lang = window.i18nGetActiveLang ? window.i18nGetActiveLang() : 'en';
    const dict = translations[lang] || translations['en'] || {};
    
    const currentTier = window.currentUser.tier;
    
    const options = [
      { id: 'daily', name: dict.tier_daily_name || 'Community', price: '€17/mo', desc: dict.student_sb_tier_desc_daily || '35 learners · Live cohort' },
      { id: 'focused', name: dict.tier_focused_name || 'Focused', price: '€39/mo', desc: dict.student_sb_tier_desc_focused || '17 learners · Small groups' },
      { id: 'intensive', name: dict.tier_intensive_name || 'Intensive', price: '€69/mo', desc: dict.student_sb_tier_desc_intensive || '6 learners · Micro-group + 1:1' },
      { id: 'onetoone', name: dict.tier_onetoone_name || '1 on 1', price: '€179/mo', desc: dict.student_sb_tier_desc_onetoone || 'Private sessions · 1 on 1' }
    ];
    
    let modalContent = `
      <div class="m-hd">
        <div class="m-ey">Membership Options</div>
        <div class="m-title">Upgrade Your Tier</div>
      </div>
      <div class="m-bd" style="padding: 1.5rem 2rem;">
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; line-height: 1.5;">Select a new plan to unlock more live classes, individual guidance, and custom feedback. Pricing is locked at founding rates.</p>
        <div style="display: flex; flex-direction: column; gap: 0.875rem;">
          ${options.map(o => `
            <div onclick="selectUpgradeTier('${o.id}')" id="up-tier-${o.id}" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border: 2px solid ${currentTier === o.id ? 'var(--b)' : 'rgba(0,0,0,0.07)'}; border-radius: 1rem; cursor: pointer; transition: all 0.15s; background: ${currentTier === o.id ? '#fcfcfc' : '#fff'};">
              <div>
                <div style="font-weight: 700; font-size: 0.95rem; color: var(--b);">${o.name} ${currentTier === o.id ? '<span style="font-size:0.65rem; background: var(--b); color: #fff; padding: 0.15rem 0.40rem; border-radius: 5rem; margin-left: 0.5rem; font-weight: normal; vertical-align: middle;">Current</span>' : ''}</div>
                <div style="font-size: 0.75rem; color: #aaa; margin-top: 0.15rem;">${o.desc}</div>
              </div>
              <div style="text-align: right; font-weight: 800; font-size: 1.1rem; color: var(--b);">${o.price}</div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top: 1.75rem; display: flex; gap: 0.875rem; justify-content: flex-end;">
          <button class="btn out sm" onclick="closeModal()">Cancel</button>
          <button class="btn sm" id="btn-confirm-upgrade" onclick="confirmUpgrade()" disabled style="opacity: 0.4; cursor: not-allowed;">Upgrade Tier</button>
        </div>
      </div>
    `;
    
    openModal(modalContent);
    window.selectedUpgradeTierId = null;
  };

  window.selectUpgradeTier = function(tierId) {
    if (tierId === window.currentUser.tier) return;
    window.selectedUpgradeTierId = tierId;
    document.querySelectorAll('[id^="up-tier-"]').forEach(el => {
      el.style.borderColor = 'rgba(0,0,0,0.07)';
      el.style.background = '#fff';
    });
    const selEl = document.getElementById('up-tier-' + tierId);
    if (selEl) {
      selEl.style.borderColor = 'var(--b)';
      selEl.style.background = '#fcfcfc';
    }
    const btn = document.getElementById('btn-confirm-upgrade');
    if (btn) {
      btn.removeAttribute('disabled');
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
    }
  };

  window.confirmUpgrade = async function() {
    const tierId = window.selectedUpgradeTierId;
    if (!tierId) return;
    
    const btn = document.getElementById('btn-confirm-upgrade');
    if (btn) {
      btn.textContent = 'Upgrading...';
      btn.style.pointerEvents = 'none';
    }
    
    try {
      localStorage.setItem(`alimun:tier_override:${window.currentUser.id}`, tierId);
      window.currentUser.tier = tierId;
      
      const sb = window.currentUser.supabase;
      if (sb) {
        await sb
          .from('student_profiles')
          .update({ tier: tierId })
          .eq('user_id', window.currentUser.id);
      }
    } catch (e) {
      console.error('Failed to update tier in DB:', e);
    }
    
    closeModal();
    window.syncUserProfileUI();
    
    if (currentView === 'settings') {
      vSettings();
    } else if (currentView === 'today') {
      vToday();
    }
  };

  window.openExtraClassPaywall = function() {
    let modalContent = `
      <div class="m-hd">
        <div class="m-ey">Weekly Limit Reached</div>
        <div class="m-title">Book an Extra Private Class</div>
      </div>
      <div class="m-bd" style="padding: 1.75rem 2rem;">
        <div style="background: #fafaf8; border-radius: 1rem; padding: 1.25rem; margin-bottom: 1.5rem; border: 1.5px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-weight: 700; font-size: 1.05rem; color: var(--b);">1-on-1 Session with Sarah</div>
            <div style="font-size: 0.78rem; color: #888; margin-top: 0.25rem;">Includes 60-minute live call + personalized study materials.</div>
          </div>
          <div style="font-size: 1.35rem; font-weight: 800; color: var(--b);">€60</div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 0.875rem;">
          <div style="font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #888; border-bottom: 1px solid rgba(0,0,0,0.06); padding-bottom: 0.5rem; margin-bottom: 0.25rem;">Credit Card Details</div>
          
          <div style="display: flex; flex-direction: column; gap: 0.625rem;">
            <input type="text" placeholder="Card number" value="4242  4242  4242  4242" disabled style="width:100%;background:#fafaf8;border:1.5px solid rgba(0,0,0,0.1);border-radius:.75rem;padding:.8rem 1rem;font-family:monospace;font-size:.95rem;color:var(--b);outline:none;" />
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem;">
              <input type="text" placeholder="MM / YY" value="12 / 28" disabled style="width:100%;background:#fafaf8;border:1.5px solid rgba(0,0,0,0.1);border-radius:.75rem;padding:.8rem 1rem;font-family:monospace;font-size:.95rem;color:var(--b);outline:none;" />
              <input type="text" placeholder="CVC" value="123" disabled style="width:100%;background:#fafaf8;border:1.5px solid rgba(0,0,0,0.1);border-radius:.75rem;padding:.8rem 1rem;font-family:monospace;font-size:.95rem;color:var(--b);outline:none;" />
            </div>
          </div>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 0.875rem; justify-content: flex-end;">
          <button class="btn out sm" onclick="closeModal()">Cancel</button>
          <button class="btn sm" id="btn-pay-extra" onclick="payExtraClass()" style="background:#080808; color:#ceff65; border:none; padding: 0.6rem 1.2rem;">Confirm & Pay (€60)</button>
        </div>
      </div>
    `;
    openModal(modalContent);
  };

  window.payExtraClass = function() {
    const btn = document.getElementById('btn-pay-extra');
    if (btn) {
      btn.textContent = 'Processing payment...';
      btn.style.pointerEvents = 'none';
    }
    
    setTimeout(() => {
      const extraKey = 'alimun:extra_classes:' + window.currentUser.id;
      const currentExtra = parseInt(localStorage.getItem(extraKey) || '0');
      localStorage.setItem(extraKey, String(currentExtra + 1));
      
      closeModal();
      vToday();
    }, 1200);
  };

  // ─ 6. Wire sign-out button ──────────────────────────────────────────────────
  window.__signOut = async function() {
    await _sb.auth.signOut();
    window.location.href = 'signin.html';
  };

  // ─ 7. Restore saved assignment state ─────────────────────────────────────────
  try {
    const res = await window.storage?.get('alimun:asgmt', false);
    if (res && res.value) {
      JSON.parse(res.value).forEach(s => {
        const a = assignments.find(x => x.id === s.id);
        if (a) Object.assign(a, s);
      });
    }
  } catch(e) {}

  window.syncUserProfileUI();
  nav('today');
})();
</script>
</body>
</html>
